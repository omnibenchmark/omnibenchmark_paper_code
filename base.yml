      - id: data.matrix
        path: "{input}/{stage}/{module}/{params}/{dataset}.data.gz"
      - id: data.true_labels
        path: "{input}/{stage}/{module}/{params}/{dataset}.labels0.gz"

  ## clustbench methods (fastcluster) ###################################################################
  

# Seeds [554, 123, 425, 365, 245]
  - id: clustering
    modules:
      - id: fastcluster
        name: "fastcluster algorithm"
        software_environment: clustbench
        repository:
          url: https://github.com/btraven00/clustbench_fastcluster
          # url: https://github.com/imallona/clustbench_fastcluster
          # url: /home/imallona/src/clustbench_fastcluster/
          # commit: "45e43d3"
          # Pending PR https://github.com/imallona/clustbench_fastcluster/pull/1
          commit: d3fb426
 
        parameters:
          - values: ["--linkage", "complete", "--seed", 554]
          - values: ["--linkage", "complete", "--seed", 123]
          - values: ["--linkage", "complete", "--seed", 425]
          - values: ["--linkage", "complete", "--seed", 365]
          - values: ["--linkage", "complete", "--seed", 245]
          # - values: ["--linkage", "ward"]
          # - values: ["--linkage", "average"]
          # - values: ["--linkage", "weighted"]
          # - values: ["--linkage", "median"]
          # - values: ["--linkage", "centroid"]

      - id: sklearn
        name: "sklearn"
        software_environment: "clustbench"
        repository:
          #url: https://github.com/imallona/clustbench_sklearn
          #url: /home/imallona/src/clustbench_sklearn
          #commit: 5877378
          # Pending PR: https://github.com/imallona/clustbench_sklearn/pull/1
          url: https://github.com/btraven00/clustbench_sklearn
          commit: 1460bcc

        parameters:
          - values: ["--method", "birch", "--seed", 554]
          - values: ["--method", "birch", "--seed", 123]
          - values: ["--method", "birch", "--seed", 425]
          - values: ["--method", "birch", "--seed", 365]
          - values: ["--method", "birch", "--seed", 245]
          # - values: ["--method", "kmeans"]
          # - values: ["--method", "spectral"] ## too slow
          # - values: ["--method", "gm"]
      - id: agglomerative
        name: "agglomerative"
        software_environment: "clustbench"
        repository:
          #url: https://github.com/imallona/clustbench_agglomerative
          #commit: 5454368
          # Pending PR: https://github.com/imallona/clustbench_agglomerative/pull/1
          url: https://github.com/btraven00/clustbench_agglomerative
          commit: 469344e
 
        parameters:
          - values: ["--linkage", "average", "--seed", 554]
          - values: ["--linkage", "average", "--seed", 123]
          - values: ["--linkage", "average", "--seed", 425]
          - values: ["--linkage", "average", "--seed", 365]
          - values: ["--linkage", "average", "--seed", 245]
          # - values: ["--linkage", "complete"]
          # - values: ["--linkage", "ward"]

      - id: genieclust
        name: "genieclust"
        software_environment: "clustbench"
        repository:
          url: https://github.com/btraven00/clustbench_genieclust
          #url: https://github.com/imallona/clustbench_genieclust
          #commit: 6090043
          # Pending PR: https://github.com/imallona/clustbench_genieclust/pull/1
          commit: 98b2ecd
 
        parameters:
          - values: ["--method", "genie", "--gini_threshold", 0.5, "--seed", 554]
          - values: ["--method", "genie", "--gini_threshold", 0.5, "--seed", 123]
          - values: ["--method", "genie", "--gini_threshold", 0.5, "--seed", 425]
          - values: ["--method", "genie", "--gini_threshold", 0.5, "--seed", 365]
          - values: ["--method", "genie", "--gini_threshold", 0.5, "--seed", 245]
          # -  values: ["--method", "gic"]
          # - values: ["--method", "ica"]
          # -   values: ["--method", "gic"]
      - id: fcps
        name: "fcps"
        software_environment: "fcps"
        repository:
          url: https://github.com/imallona/clustbench_fcps
          #commit: fc37faa
          commit: b57c78c # latest, fix pinning
        parameters:
          - values: ["--method", "FCPS_Minimax", "--seed", 554]
          - values: ["--method", "FCPS_Minimax", "--seed", 123]
          - values: ["--method", "FCPS_Minimax", "--seed", 425]
          - values: ["--method", "FCPS_Minimax", "--seed", 365]
          - values: ["--method", "FCPS_Minimax", "--seed", 245]

          - values: ["--method", "FCPS_HDBSCAN_2", "--seed", 554]
          - values: ["--method", "FCPS_HDBSCAN_2", "--seed", 123]
          - values: ["--method", "FCPS_HDBSCAN_2", "--seed", 425]
          - values: ["--method", "FCPS_HDBSCAN_2", "--seed", 365]
          - values: ["--method", "FCPS_HDBSCAN_2", "--seed", 245]

          - values: ["--method", "FCPS_Diana", "--seed", 554]
          - values: ["--method", "FCPS_Diana", "--seed", 123]
          - values: ["--method", "FCPS_Diana", "--seed", 425]
          - values: ["--method", "FCPS_Diana", "--seed", 365]
          - values: ["--method", "FCPS_Diana", "--seed", 245]

          - values: ["--method", "FCPS_Hardcl", "--seed", 554]
          - values: ["--method", "FCPS_Hardcl", "--seed", 123]
          - values: ["--method", "FCPS_Hardcl", "--seed", 425]
          - values: ["--method", "FCPS_Hardcl", "--seed", 365]
          - values: ["--method", "FCPS_Hardcl", "--seed", 245]

          - values: ["--method", "FCPS_Clara", "--seed", 554]
          - values: ["--method", "FCPS_Clara", "--seed", 123]
          - values: ["--method", "FCPS_Clara", "--seed", 425]
          - values: ["--method", "FCPS_Clara", "--seed", 365]
          - values: ["--method", "FCPS_Clara", "--seed", 245]

          #- values: ["--method", "FCPS_MinEnergy", "--seed", 2]
          # -values: ["--method", "FCPS_HDBSCAN_4", "--seed", 2]  
          #- values: ["--method", "FCPS_HDBSCAN_8", "--seed", 2]  
          #- values: ["--method", "FCPS_HDBSCAN_8", "--seed", 123]  
          #- values: ["--method", "FCPS_Fanny", "--seed", 2]  
          # - values: ["--method", "FCPS_Softcl", "--seed", 2] 
          # - values: ["--method", "FCPS_PAM", "--seed", 2]
          # - values: ["--method", "FCPS_PAM", "--seed", 2]
          # - values: ["--method", "FCPS_AdaptiveDensityPeak"] # not in conda
    inputs:
      - entries:
          - data.matrix
          - data.true_labels
    outputs:
      - id: clustering.predicted_ks_range
        path: "{input}/{stage}/{module}/{params}/{dataset}_ks_range.labels.gz"

  - id: metrics
    modules:
      - id: partition_metrics
        name: "clustbench partition metrics"
        software_environment: "clustbench"
        repository:
          url: https://github.com/imallona/clustbench_metrics
          commit: 9132d45
        parameters:
          - values: ["--metric", "normalized_clustering_accuracy"]
          - values: ["--metric", "adjusted_fm_score"]
          - values: ["--metric", "adjusted_mi_score"]
          - values: ["--metric", "adjusted_rand_score"]
          - values: ["--metric", "fm_score"]
          - values: ["--metric", "mi_score"]
          - values: ["--metric", "pair_sets_index"]
          # - values: ["--metric", "normalized_clustering_accuracy"]
          # - values: ["--metric", "normalized_mi_score"]
          # - values: ["--metric", "normalized_pivoted_accuracy"]
          # - values: ["--metric", "pair_sets_index"]
          # - values: ["--metric", "rand_score"]
    inputs:
      - entries:
          - clustering.predicted_ks_range
          - data.true_labels
    outputs:
      - id: metrics.scores
        path: "{input}/{stage}/{module}/{params}/{dataset}.scores.gz"

